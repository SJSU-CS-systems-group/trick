kotlin.code.style=official
kotlin.daemon.jvmargs=-Xmx2048M

#Gradle
org.gradle.jvmargs=-Xmx2048M -Dfile.encoding=UTF-8

#Android
android.nonTransitiveRClass=true
android.useAndroidX=true

# Kotlin Multiplatform / libsignal configuration
# We use an explicit iOS hierarchy in composeApp/build.gradle.kts,
# so disable the default hierarchy template to avoid noisy warnings.
kotlin.mpp.applyDefaultHierarchyTemplate=false

# Enable cinterop commonization for libsignal native bindings on iOS.
kotlin.mpp.enableCInteropCommonization=true
